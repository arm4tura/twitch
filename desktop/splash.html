<!doctype html>
<html lang="ru" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self';
                   style-src 'self' 'unsafe-inline';
                   img-src 'self' data: blob:;
                   font-src 'self' data:;
                   connect-src 'self' ws://localhost:* ws://127.0.0.1:*;" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Twitch Cutter — установка</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body {
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        background: #0b0b0f;
        color: #e6e6ea;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 28px 32px;
        -webkit-user-select: none;
        user-select: none;
      }
      .title { font-size: 18px; font-weight: 600; margin: 0 0 2px; }
      .subtitle { font-size: 12px; color: #8a8a96; margin: 0 0 22px; }
      .stage { font-size: 14px; font-weight: 500; margin: 0 0 10px; min-height: 20px; }
      .track { height: 8px; background: #1c1c24; border-radius: 999px; overflow: hidden; }
      .bar {
        height: 100%; width: 0%;
        background: linear-gradient(90deg, #9146ff, #b98bff);
        border-radius: 999px;
        transition: width 0.4s ease;
      }
      .detail {
        font-family: ui-monospace, "Cascadia Code", monospace;
        font-size: 11px; color: #6f6f7a;
        margin-top: 12px; height: 16px;
        overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      }
      .badge {
        display: inline-block; margin-top: 4px; font-size: 11px;
        padding: 2px 8px; border-radius: 999px; background: #1c1c24; color: #8a8a96;
      }
      .badge.cpu { background: #3a2a10; color: #e0a94a; }
      .actions { margin-top: 18px; display: none; gap: 10px; }
      .actions.show { display: flex; }
      button {
        font: inherit; font-size: 13px; cursor: pointer;
        border: 1px solid #2a2a34; background: #16161d; color: #e6e6ea;
        padding: 7px 14px; border-radius: 8px;
      }
      button.primary { background: #9146ff; border-color: #9146ff; color: #fff; }
      button:hover { filter: brightness(1.1); }
      .error .stage { color: #ff6b6b; }
    </style>
  </head>
  <body>
    <div id="app">
      <p class="title">Twitch Cutter</p>
      <p class="subtitle">Первый запуск — готовлю окружение. Это разово.</p>
      <p class="stage" id="stage">Проверяю окружение…</p>
      <div class="track"><div class="bar" id="bar"></div></div>
      <div class="detail" id="detail"></div>
      <span class="badge" id="badge" style="display:none"></span>
      <div class="actions" id="actions">
        <button class="primary" id="retry">Повторить</button>
        <button id="log">Показать лог</button>
      </div>
    </div>
    <script type="module" src="/src/splash.ts"></script>
  </body>
</html>
